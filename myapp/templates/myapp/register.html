{% extends 'myapp/base.html' %}


{% block content %}


<div class="row justify-content-center mt-5">


    <div class="col-md-5">


        <div class="card shadow">


            <div class="card-body">


                <h2 class="text-center mb-4">
                    Create Account
                </h2>



                <form method="POST">


                    {% csrf_token %}
                    {% if form.errors %}


<div class="alert alert-danger">


{% for field in form %}


{% for error in field.errors %}


<p>

{{ error }}

</p>


{% endfor %}


{% endfor %}


</div>


{% endif %}



                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>


                        <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Choose username">


                    </div>



                    <div class="mb-3">


                        <label class="form-label">
                            Password
                        </label>


                        <input
                        type="password"
                        name="password1"
                        class="form-control"
                        placeholder="Create password">


                    </div>



                    <div class="mb-3">


                        <label class="form-label">
                            Confirm Password
                        </label>


                        <input
                        type="password"
                        name="password2"
                        class="form-control"
                        placeholder="Confirm password">


                    </div>




                    <button
                    type="submit"
                    class="btn btn-success w-100">


                    Register


                    </button>



                </form>



                <hr>



                <p class="text-center">


                    Already have an account?


                    <a href="{% url 'login' %}">

                    Login here

                    </a>


                </p>




            </div>


        </div>


    </div>


</div>


{% endblock %}
