{% extends 'myapp/base.html' %}


{% block content %}


<div class="row justify-content-center mt-5">

    <div class="col-md-5">


        <div class="card shadow">


            <div class="card-body">


                <h2 class="text-center mb-4">
                    Login
                </h2>


                <form method="POST">

                    {% csrf_token %}


                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username">

                    </div>



                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>


                        <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password">

                    </div>



                    <button 
                    class="btn btn-primary w-100"
                    type="submit">

                    Login

                    </button>


                </form>


                <hr>


                <p class="text-center">

                    Don't have an account?

                    <a href="{% url 'register' %}">

                    Register here

                    </a>

                </p>


            </div>


        </div>


    </div>


</div>


{% endblock %}
